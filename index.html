<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 설문조사</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Pretendard', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        /* 첫 번째 MBTI 질문 영역 */
        .mbti-header {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .mbti-header h2 {
            margin-top: 0;
            font-size: 1.5rem;
            color: #2c3e50;
        }

        .mbti-selectors {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .mbti-selectors select {
            padding: 10px 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            background-color: #fff;
            cursor: pointer;
            outline: none;
            appearance: none;
            text-align: center;
        }

        .mbti-selectors select:focus {
            border-color: var(--primary-color);
        }

        /* 개별 설문 질문 영역 */
        .question-card {
            background: var(--card-bg);
            padding: 24px 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 25px;
            word-break: keep-all;
        }

        .options-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        .options-container::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 10%;
            right: 10%;
            height: 2px;
            background-color: #e0e0e0;
            z-index: 0;
        }

        .option-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            z-index: 1;
            background-color: var(--card-bg);
            padding: 0 5px;
        }

        .option-group input[type="radio"] {
            margin-bottom: 10px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .option-group:nth-child(1) input[type="radio"],
        .option-group:nth-child(5) input[type="radio"] { width: 32px; height: 32px; accent-color: #8E24AA; }
        .option-group:nth-child(2) input[type="radio"],
        .option-group:nth-child(4) input[type="radio"] { width: 26px; height: 26px; accent-color: #AB47BC; }
        
        .option-group:nth-child(4) input[type="radio"],
        .option-group:nth-child(5) input[type="radio"] { accent-color: #4CAF50; }

        .option-label {
            font-size: 0.85rem;
            color: #666;
            text-align: center;
            line-height: 1.3;
            min-width: 60px;
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            margin-bottom: 50px;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #45a049;
        }

        .submit-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        @media (max-width: 600px) {
            .options-container::before { display: none; }
            .option-label { font-size: 0.75rem; min-width: 50px; }
        }
    </style>
</head>
<body>

<div class="container">
    <form id="mbtiForm">
        <!-- 1. MBTI 입력 영역 -->
        <div class="mbti-header">
            <h2>당신의 MBTI는 무엇인가요?</h2>
            <p style="color: #666; margin-bottom: 5px;">본인의 MBTI 알파벳 4자리를 선택해 주세요.</p>
            <div class="mbti-selectors">
                <select name="mbti_ie" required>
                    <option value="" disabled selected>선택</option>
                    <option value="I">I (내향)</option>
                    <option value="E">E (외향)</option>
                </select>
                <select name="mbti_sn" required>
                    <option value="" disabled selected>선택</option>
                    <option value="S">S (감각)</option>
                    <option value="N">N (직관)</option>
                </select>
                <select name="mbti_tf" required>
                    <option value="" disabled selected>선택</option>
                    <option value="T">T (사고)</option>
                    <option value="F">F (감정)</option>
                </select>
                <select name="mbti_jp" required>
                    <option value="" disabled selected>선택</option>
                    <option value="J">J (판단)</option>
                    <option value="P">P (인식)</option>
                </select>
            </div>
        </div>

        <!-- 2. 설문 문항 영역 -->
        <div id="survey-container"></div>

        <button type="submit" class="submit-btn" id="submitBtn">결과 제출하기</button>
    </form>
</div>

<!-- Firebase 연동을 위한 모듈 스크립트 -->
<script type="module">
    // Firebase SDK 불러오기
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // 사용자의 Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyBZZI0oLh_DBUZiWrS1ibecraprAFwsnug",
        authDomain: "mbti-cda0a.firebaseapp.com",
        projectId: "mbti-cda0a",
        storageBucket: "mbti-cda0a.firebasestorage.app",
        messagingSenderId: "64465648121",
        appId: "1:64465648121:web:9784f311a8bf2827a56528"
    };

    // Firebase 및 Firestore 초기화
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 질문 목록 (60개)
    const questions = [
        "주기적으로 새로운 친구를 만든다.", "자유 시간 중 상당 부분을 다양한 관심사를 탐구하는 데 할애한다.", "다른 사람이 울고 있는 모습을 보면 자신도 울고 싶어질 때가 많다.", "일이 잘못될 때를 대비해 여러 대비책을 세우는 편이다.", "압박감이 심한 환경에서도 평정심을 유지하는 편이다.",
        "파티나 행사에서 새로운 사람에게 먼저 자신을 소개하기보다는 주로 이미 알고 있는 사람과 대화하는 편이다.", "하나의 프로젝트를 완전히 완료한 후 다른 프로젝트를 시작하는 편이다.", "매우 감상적인 편이다.", "일정이나 목록으로 계획을 세우는 일을 좋아한다.", "작은 실수로도 자신의 능력이나 지식을 의심하곤 한다.",
        "관심이 가는 사람에게 다가가서 대화를 시작하기가 어렵지 않다.", "예술 작품의 다양한 해석에 대해 토론하는 일에는 크게 관심이 없다.", "감정보다는 이성을 따르는 편이다.", "하루 일정을 계획하기보다는 즉흥적으로 하고 싶은 일을 하는 것을 좋아한다.", "다른 사람에게 자신이 어떤 사람으로 보일지 걱정하지 않는 편이다.",
        "단체 활동에 참여하는 일을 즐긴다.", "결말을 자신의 방식으로 해석할 수 있는 책과 영화를 좋아한다.", "자신보다는 남의 성공을 돕는 일에서 더 큰 만족감을 느낀다.", "관심사가 너무 많아 다음에 어떤 일을 해야 할지 모를 때가 있다.", "일이 잘못될까봐 자주 걱정하는 편이다.",
        "단체에서 지도자 역할을 맡는 일은 가능한 피하고 싶다.", "자신에게 예술적 성향이 거의 없다고 생각한다.", "사람들이 감정보다는 이성을 중시했다면 더 나은 세상이 되었으리라고 생각한다.", "휴식을 취하기 전에 집안일을 먼저 끝내기를 원한다.", "다른 사람의 논쟁을 바라보는 일이 즐겁다.",
        "다른 사람의 주의를 끌지 않으려고 하는 편이다.", "감정이 매우 빠르게 변하곤 한다.", "자신만큼 효율적이지 못한 사람을 보면 짜증이 난다.", "해야 할 일을 마지막까지 미룰 때가 많다.", "사후세계에 대한 질문이 흥미롭다고 생각한다.",
        "혼자보다는 다른 사람과 시간을 보내고 싶어한다.", "이론 중심의 토론에는 관심이 없으며 원론적인 이야기는 지루하다고 생각한다.", "자신과 배경이 완전히 다른 사람에게도 쉽게 공감할 수 있다.", "결정을 내리는 일을 마지막까지 미루는 편이다.", "이미 내린 결정에 대해서는 다시 생각하지 않는 편이다.",
        "혼자만의 시간을 보내기보다는 즐거운 파티와 행사로 일주일의 피로를 푸는 편이다.", "미술관에 가는 일을 좋아한다.", "다른 사람의 감정을 이해하기 힘들 때가 많다.", "매일 할 일을 계획하는 일을 좋아한다.", "불안함을 느낄 때가 거의 없다.",
        "전화 통화를 거는 일은 가능한 피하고 싶다.", "자신의 의견과 매우 다른 의견을 이해하기 위해 많은 시간을 할애하곤 한다.", "친구에게 먼저 만나자고 연락하는 편이다.", "계획에 차질이 생기면 최대한 빨리 계획으로 돌아가기 위해 노력한다.", "오래전의 실수를 후회할 때가 많다.",
        "인간의 존재와 삶의 이유에 대해 깊이 생각하지 않는 편이다.", "감정을 조절하기보다는 감정에 휘둘리는 편이다.", "상대방의 잘못이라는 것이 명백할 때도 상대방의 체면을 살려주기 위해 노력한다.", "계획에 따라 일관성 있게 업무를 진행하기보다는 즉흥적인 에너지로 업무를 몰아서 처리하는 편이다.", "상대방이 자신을 높게 평가하면 나중에 상대방이 실망하게 될까 걱정하곤 한다.",
        "대부분의 시간을 혼자서 일할 수 있는 직업을 원한다.", "철학적인 질문에 대해 깊게 생각하는 일은 시간 낭비라고 생각한다.", "조용하고 사적인 장소보다는 사람들로 붐비고 떠들썩한 장소를 좋아한다.", "상대방의 감정을 바로 알아차릴 수 있다.", "무엇인가에 압도당하는 기분을 느낄 때가 많다.",
        "단계를 건너뛰는 일 없이 절차대로 일을 완수하는 편이다.", "논란이 되거나 논쟁을 불러일으킬 수 있는 주제에 관심이 많다.", "자신보다 다른 사람에게 더 필요한 기회라고 생각되면 기회를 포기할 수도 있다.", "마감 기한을 지키기가 힘들다.", "일이 원하는 대로 진행될 것이라는 자신감이 있다."
    ];

    const container = document.getElementById('survey-container');

    const scales = [
        { value: -2, text: "매우<br>그렇지 않다" },
        { value: -1, text: "그렇지<br>않다" },
        { value: 0,  text: "보통<br>이다" },
        { value: 1,  text: "그렇다" },
        { value: 2,  text: "매우<br>그렇다" }
    ];

    // 질문 DOM 렌더링
    questions.forEach((questionText, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';

        const title = document.createElement('div');
        title.className = 'question-text';
        title.innerText = `${index + 1}. ${questionText}`;
        card.appendChild(title);

        const optionsContainer = document.createElement('div');
        optionsContainer.className = 'options-container';

        scales.forEach(scale => {
            const label = document.createElement('label');
            label.className = 'option-group';

            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = `q${index + 1}`;
            radio.value = scale.value;
            radio.required = true;

            const span = document.createElement('span');
            span.className = 'option-label';
            span.innerHTML = scale.text;

            label.appendChild(radio);
            label.appendChild(span);
            optionsContainer.appendChild(label);
        });

        card.appendChild(optionsContainer);
        container.appendChild(card);
    });

    // 폼 제출 이벤트 (Firebase 데이터베이스에 저장)
    document.getElementById('mbtiForm').addEventListener('submit', async function(event) {
        event.preventDefault(); // 새로고침 방지

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = "저장 중...";
        submitBtn.disabled = true;

        const formData = new FormData(event.target);
        
        // MBTI 값 추출
        const userMBTI = formData.get('mbti_ie') + formData.get('mbti_sn') + formData.get('mbti_tf') + formData.get('mbti_jp');

        // 60개의 답변 객체로 정리
        const surveyAnswers = {};
        for(let i = 1; i <= questions.length; i++) {
            surveyAnswers[`q${i}`] = parseInt(formData.get(`q${i}`));
        }

        try {
            // Firestore 'mbti_surveys' 컬렉션에 데이터 추가
            await addDoc(collection(db, "mbti_surveys"), {
                mbti: userMBTI,
                answers: surveyAnswers,
                createdAt: serverTimestamp() // 저장된 시간 기록
            });
            
            alert(`제출이 완료되었습니다!\n(당신의 MBTI: ${userMBTI})\n설문에 참여해 주셔서 감사합니다.`);
            
            // 제출 완료 후 페이지 초기화 (원할 경우 주석 해제)
            // window.location.reload(); 
            
        } catch (error) {
            console.error("Error adding document: ", error);
            alert("저장 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.");
        } finally {
            // 버튼 상태 원상복구
            submitBtn.innerText = "결과 제출하기";
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
